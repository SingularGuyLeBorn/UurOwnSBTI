          - paragraph [ref=e332]: SBTI-Engine 诞生于对无聊测试的反抗。我们相信，人类的网络人格从来不是 16 种颜色可以概括的。你可能在凌晨三点化身「键盘战神」，在白天却是兢兢业业的「NPC」，偶尔还想做一只「哥布林」阴暗爬行。
          - paragraph [ref=e333]: 于是我们打造了这款混沌测试：266 种互联网原生人格、585 道带着 meme 气息的题目、7 层混合计分逻辑。没有标准答案，只有更荒诞、更真实的你。
